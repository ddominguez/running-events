name: Sync Races

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...

      - name: Fetch new races
        run: go run ./cmd/fetch
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          # STRAVA_REFRESH_TOKEN is a Variable (not Secret) because it rotates on each
          # token refresh and needs to be updated programmatically via the GitHub API.
          STRAVA_REFRESH_TOKEN: ${{ vars.STRAVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Generate site
        run: go run ./cmd/generate
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      - name: Commit and push
        run: |
          git diff --quiet data/ site/ || (
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add data/ site/
            git commit -m "chore: sync races [skip ci]"
            git push
          )
